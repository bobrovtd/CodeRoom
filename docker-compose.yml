services:
  backend:
    build:
      context: ./backend
    command: npm run dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - CLIENT_ORIGIN=http://localhost:5173
      - RUNNER_IMAGE=collab-python-runner

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_WS_URL=ws://localhost:4000
    depends_on:
      - backend
