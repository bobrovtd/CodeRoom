services:
  runner-image:
    image: dh-mirror.gitverse.ru/library/python:3.12-slim
    command: ["true"]
    restart: "no"

  backend:
    build:
      context: ./backend
    command: npm run dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ALLOWED_ORIGINS=http://localhost:5173
      - RUNNER_IMAGE=dh-mirror.gitverse.ru/library/python:3.12-slim
      - RUN_TIMEOUT_MS=15000
    depends_on:
      runner-image:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api
      - VITE_WS_BASE_URL=ws://localhost:4000
    depends_on:
      - backend
